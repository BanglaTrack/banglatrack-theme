name: Deploy Theme To cPanel via FTP

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify deployment secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          CPANEL_THEME_PATH: ${{ secrets.CPANEL_THEME_PATH }}
        run: |
          test -n "$FTP_SERVER" || { echo "FTP_SERVER is missing"; exit 1; }
          test -n "$FTP_USERNAME" || { echo "FTP_USERNAME is missing"; exit 1; }
          test -n "$FTP_PASSWORD" || { echo "FTP_PASSWORD is missing"; exit 1; }
          test -n "$CPANEL_THEME_PATH" || { echo "CPANEL_THEME_PATH is missing"; exit 1; }

      - name: Deploy files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.CPANEL_THEME_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.vscode/**
            **/.idea/**
            **/package.json
            **/package-lock.json
            **/*.zip
            **/*.tar.gz
            **/Thumbs.db
            **/.DS_Store
