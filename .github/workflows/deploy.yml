name: Deploy Theme To cPanel

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: SCP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify deployment secrets
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          CPANEL_THEME_PATH: ${{ secrets.CPANEL_THEME_PATH }}
        run: |
          test -n "$CPANEL_HOST" || { echo "CPANEL_HOST is missing"; exit 1; }
          test -n "$CPANEL_PORT" || { echo "CPANEL_PORT is missing"; exit 1; }
          test -n "$CPANEL_USER" || { echo "CPANEL_USER is missing"; exit 1; }
          test -n "$CPANEL_SSH_KEY" || { echo "CPANEL_SSH_KEY is missing"; exit 1; }
          test -n "$CPANEL_THEME_PATH" || { echo "CPANEL_THEME_PATH is missing"; exit 1; }

      - name: Build deployment archive
        run: |
          tar \
            --exclude-vcs \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='*.log' \
            --exclude='*.zip' \
            --exclude='*.tar.gz' \
            --exclude='.vscode' \
            --exclude='.idea' \
            -czf /tmp/theme.tar.gz .
          mv /tmp/theme.tar.gz theme.tar.gz

      - name: Prepare target directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CPANEL_HOST }}
          port: ${{ secrets.CPANEL_PORT }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          script: |
            set -e
            mkdir -p "${{ secrets.CPANEL_THEME_PATH }}"

      - name: Upload archive via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.CPANEL_HOST }}
          port: ${{ secrets.CPANEL_PORT }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          source: theme.tar.gz
          target: ${{ secrets.CPANEL_THEME_PATH }}
          debug: true

      - name: Extract archive on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CPANEL_HOST }}
          port: ${{ secrets.CPANEL_PORT }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          debug: true
          script: |
            set -e
            cd "${{ secrets.CPANEL_THEME_PATH }}"
            command -v tar >/dev/null 2>&1 || { echo "tar not found on remote host"; exit 1; }
            tar -xzf theme.tar.gz
            rm -rf .git .github
            rm -f .gitignore
            rm -f theme.tar.gz
